    <h1>Calculadora Financeira</h1>
    <p>Experimente a calculadora financeira para calcular seus ganhos ao longo do tempo através de investimentos continuos que demonstrarão seus ganhos potencializados através de juros compostos.</p>


    <form>
        <div>
            <label for="">Valor inicial a ser investido</label>
            <input id="initial" type="text">
        </div>
        <div>
            <label for="">Valor mensal</label>
            <input id="month" type="text">
        </div>
        <div>
            <label for="">Taxa de Juros</label>
            <input id="rate" type="text">
        </div>
        <div>
            <label for="">Periodo</label>
            <input id="period" type="text">
        </div>
        <button id="calculate" type="submit">Calcular</button>
    </form>

    <div id="total"></div>
    
</body>
