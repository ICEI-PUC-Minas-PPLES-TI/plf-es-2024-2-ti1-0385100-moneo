<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Eric" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous">defer</script>
    <link rel="stylesheet" href="../assets/css/perfil.css">
    <script src="../assets/js/perfil.js">defer</script>
    

    <title>Perfil</title>

</head>

<body>
    <!-- Header -->
    <header>
        <nav class="navbar navbar-light py-3 ">
            <div class="container-fluid d-flex justify-content-between mx-3">
                <a class="navbar-brand" href="#">Moneo</a>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown d-flex align-items-center">
                        <img src="https://via.placeholder.com/100" alt="Usuario" class="imagemUsuario">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">   
                            Nome Usuario 
                        </a>
                        <ul class="dropdown-menu mt-2" style="position: absolute; top: 100%; right: 0;">
                            <li><a class="dropdown-item" href="#">Sair</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </nav>
    </header>


    <!-- Main -->
    <main>
        <div class="container mt-3">
            <h4>Meu Perfil</h4>
            <div class="linha mt-0 pt-0"></div>

            <!-- Editar Foto de Perfil -->
            <div class="bg-light  p-4 mt-4 fundo-main">
                <h5>Perfil</h5>
                <div class="d-flex align-items-center">
                    <div class="position-relative">
                        <button class="btn botao-fotoDePerfil">
                            <img src="https://via.placeholder.com/100" alt="Foto de perfil" class="rounded-circle">
                            <button class="btn lapis-botao">
                                <i class="fas fa-pencil-alt"></i>
                            </button>
                        </button>
                    </div>
                    <div class="ml-3 textoPerfil">
                        <h6>Nome de Usuário</h6>
                        <p>Nome Completo</p>
                    </div>
                </div>
            </div>
            <!-- Editar Informações Pessoais-->
            <div class="bg-light p-4 mt-4 fundo-main">
                <div class="d-flex justify-content-between align-items-center">
                    <h4>Informações</h4>
                    <button class="btn btn-primary">Editar</button>
                </div>
                <div class="mt-3">
                    <div class="form-group row align-items-center mb-3">
                        <label for="nome" class="col-sm-4 col-md-3 col-lg-2 col-form-label">Nome:</label>
                        <div class="col-sm-6">
                            <input type="nome" class="form-control form-control-inline" id="cfgNome" placeholder="*Preencher com o nome do usuario*">
                        </div>
                    </div>
                    <div class="form-group row align-items-center mb-3">
                        <label for="email" class="col-sm-4 col-md-3 col-lg-2 col-form-label">Email:</label>
                        <div class="col-sm-6">
                            <input type="email" class="form-control form-control-inline" id="cfgEmail" placeholder="*Preencher com o email do usuario*">
                        </div>
                    </div>
                    <div class="form-group row align-items-center mb-1">
                        <label for="telefone" class="col-sm-4 col-md-3 col-lg-2 col-form-label">Telefone:</label>
                        <div class="col-sm-6">
                            <input type="tel" class="form-control form-control-inline" id="cfgTelefone" placeholder="*Preencher com o telefone do usuario*">
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Editar Informações de Segurança -->
            <div class="bg-light p-4 mt-4 fundo-main">
                <div class="d-flex justify-content-between align-items-center">
                    <h4>Segurança</h4>
                    <button class="btn btn-primary">Editar</button>
                </div>
                <div class="mt-3">
                    <div class="form-group row align-items-center mb-3">
                        <label for="senhaAtual" class="col-sm-4 col-md-3 col-lg-2 col-form-label">Senha atual:</label>
                        <div class="col-sm-6">
                            <input type="senha" class="form-control form-control-inline" id="cfgSenhaAtual" placeholder="">
                        </div>
                    </div>
                    <div class="form-group row align-items-center mb-3">
                        <label for="novaSenha" class="col-sm-4 col-md-3 col-lg-2 col-form-label">Nova senha:</label>
                        <div class="col-sm-6">
                            <input type="novasenha" class="form-control form-control-inline" id="cfgNovaSenha" placeholder="">
                        </div>
                    </div>
                </div>
            </div>


        </div>
    </main>


    <main>

    </main>




</body>

</html>
